name: Configure Apps Script URL

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/add-apps-script-url.yml

permissions:
  contents: write

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Add Apps Script web app URL
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          content = path.read_text(encoding="utf-8")
          old = '  PROXY_URL: "",'
          new = '  PROXY_URL: "https://script.google.com/macros/s/AKfycbzzyzpZ_sc1VqofE12yvaEEzVdKOZbQgVN8fjg-6yWUy3EcsYzDuKalp3FuJFn55BN-/exec",'

          if old not in content:
              raise SystemExit("The expected empty PROXY_URL setting was not found.")

          path.write_text(content.replace(old, new, 1), encoding="utf-8")
          PY

          rm .github/workflows/add-apps-script-url.yml

      - name: Commit the configuration
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/add-apps-script-url.yml
          git commit -m "Connect Sorting Hat to Apps Script"
          git push
