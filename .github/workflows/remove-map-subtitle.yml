name: Remove map subtitle

on:
  push:
    paths:
      - '.github/workflows/remove-map-subtitle.yml'

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove subtitle text
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          old = '  mapSub: "drawn in ink and mischief — every place her heart has wandered, 1996 to now",'
          new = '  mapSub: "",'
          if old not in text:
              raise SystemExit('Expected subtitle text was not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Commit change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Remove map subtitle"
          git push
