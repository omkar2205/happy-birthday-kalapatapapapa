name: Fix Sorting Hat audio playback

on:
  push:
    paths:
      - '.github/workflows/fix-hat-audio-playback.yml'

permissions:
  contents: write

jobs:
  fix-audio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unlock and play Groq audio with Web Audio
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          start_marker = 'let activeHatAudio = null;'
          end_marker = '\n\n/* ---------- REVEAL THE MAP ---------- */'
          start = text.find(start_marker)
          end = text.find(end_marker, start)
          if start == -1 or end == -1:
              raise SystemExit('Existing audio block was not found')

          new_audio = r'''const HatAudioContext = window.AudioContext || window.webkitAudioContext;
          let hatAudioContext = null;
          let activeHatSource = null;
          let audioSequenceId = 0;

          function getHatAudioContext(){
            if(!HatAudioContext) return null;
            if(!hatAudioContext) hatAudioContext = new HatAudioContext();
            return hatAudioContext;
          }

          function unlockHatAudio(){
            const context = getHatAudioContext();
            if(!context) return;

            if(context.state === 'suspended'){
              context.resume().catch(error => {
                console.error('Sorting Hat audio could not be unlocked:', error);
              });
            }

            try{
              const silentBuffer = context.createBuffer(1, 1, 22050);
              const silentSource = context.createBufferSource();
              silentSource.buffer = silentBuffer;
              silentSource.connect(context.destination);
              silentSource.start(0);
            }catch(error){
              console.error('Sorting Hat audio unlock failed:', error);
            }
          }

          function stopHatAudio(){
            audioSequenceId++;

            if(activeHatSource){
              try{ activeHatSource.stop(0); }catch(_){}
              try{ activeHatSource.disconnect(); }catch(_){}
              activeHatSource = null;
            }
          }

          function base64ToArrayBuffer(base64){
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);

            for(let i = 0; i < binary.length; i++){
              bytes[i] = binary.charCodeAt(i);
            }

            return bytes.buffer;
          }

          function decodeHatAudio(context, arrayBuffer){
            return new Promise((resolve, reject) => {
              let settled = false;
              const succeed = value => {
                if(!settled){ settled = true; resolve(value); }
              };
              const fail = error => {
                if(!settled){ settled = true; reject(error); }
              };

              try{
                const result = context.decodeAudioData(arrayBuffer.slice(0), succeed, fail);
                if(result && typeof result.then === 'function'){
                  result.then(succeed, fail);
                }
              }catch(error){
                fail(error);
              }
            });
          }

          async function playHatAudioClips(clips){
            if(!Array.isArray(clips) || clips.length === 0) return;

            const context = getHatAudioContext();
            if(!context) throw new Error('Web Audio is not supported in this browser.');

            if(context.state === 'suspended') await context.resume();
            if(context.state !== 'running') throw new Error('The browser did not allow audio playback.');

            stopHatAudio();
            const sequenceId = audioSequenceId;

            for(const clip of clips){
              if(sequenceId !== audioSequenceId) break;

              const audioBuffer = await decodeHatAudio(
                context,
                base64ToArrayBuffer(clip)
              );

              if(sequenceId !== audioSequenceId) break;

              await new Promise((resolve, reject) => {
                const source = context.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(context.destination);
                activeHatSource = source;

                source.onended = () => {
                  if(activeHatSource === source) activeHatSource = null;
                  try{ source.disconnect(); }catch(_){}
                  resolve();
                };

                try{
                  source.start(0);
                }catch(error){
                  if(activeHatSource === source) activeHatSource = null;
                  reject(error);
                }
              });
            }
          }

          async function requestHatSpeech(text){
            if(!CONFIG.PROXY_URL || !text) return;

            const response = await fetch(CONFIG.PROXY_URL, {
              method:'POST',
              headers:{ 'Content-Type':'text/plain;charset=utf-8' },
              body:JSON.stringify({ action:'tts', text })
            });

            const data = await response.json();

            if(data && Array.isArray(data.audio) && data.audio.length){
              await playHatAudioClips(data.audio);
              return;
            }

            if(data && data.error){
              console.error('Sorting Hat voice generation failed:', data.error);
            }
          }'''

          text = text[:start] + new_audio + text[end:]

          old_hat_click = "$('hatPerch').addEventListener('click', () => {\n  show('hatOverlay');"
          new_hat_click = "$('hatPerch').addEventListener('click', () => {\n  unlockHatAudio();\n  show('hatOverlay');"
          if old_hat_click not in text:
              raise SystemExit('Sorting Hat click handler was not found')
          text = text.replace(old_hat_click, new_hat_click, 1)

          old_listeners = r'''$('hatSend').addEventListener('click', () => askHat($('hatInput').value.trim()));
          $('hatInput').addEventListener('keydown', e => { if(e.key==='Enter') askHat($('hatInput').value.trim()); });
          $('hatMic').addEventListener('click', () => {
            const ok = listen($('hatMic'), t => { $('hatInput').value = t; setTimeout(()=>askHat(t), 200); });
            if(!ok){ $('hatStatus').textContent = 'the Hat can\'t hear here — type to it instead.'; }
          });'''

          new_listeners = r'''$('hatSend').addEventListener('click', () => {
            unlockHatAudio();
            askHat($('hatInput').value.trim());
          });
          $('hatInput').addEventListener('keydown', e => {
            if(e.key === 'Enter'){
              unlockHatAudio();
              askHat($('hatInput').value.trim());
            }
          });
          $('hatMic').addEventListener('click', () => {
            unlockHatAudio();
            const ok = listen($('hatMic'), t => { $('hatInput').value = t; setTimeout(()=>askHat(t), 200); });
            if(!ok){ $('hatStatus').textContent = 'the Hat can\'t hear here — type to it instead.'; }
          });'''

          if old_listeners not in text:
              raise SystemExit('Sorting Hat input listener block was not found')
          text = text.replace(old_listeners, new_listeners, 1)

          path.write_text(text, encoding='utf-8')
          Path('.github/workflows/fix-hat-audio-playback.yml').unlink()
          PY

      - name: Commit the frontend fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/fix-hat-audio-playback.yml
          git commit -m "Fix Sorting Hat audio playback"
          git push
