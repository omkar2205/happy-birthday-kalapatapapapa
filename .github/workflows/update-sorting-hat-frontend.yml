name: Update Sorting Hat frontend

on:
  push:
    paths:
      - '.github/workflows/update-sorting-hat-frontend.yml'

permissions:
  contents: write

jobs:
  update-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update index.html
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          public_prompt = '''  // Sent to Groq as the system prompt when PROXY_URL is set.
          hatSystemPrompt:
            "You are the Sorting Hat from Hogwarts, speaking directly to a witch named Poornima on her birthday. " +
            "Voice: wise, theatrical, a touch grumpy, warm underneath, and quick with a tease. Keep replies SHORT — 1 to 3 sentences. " +
            "Never break character or mention being an AI. What you know about her: she is deeply kind and selfless, always putting others above herself; " +
            "she is from Vijayawada and now lives in Hyderabad; she works alongside her friend Omkar, who made this for her (she joined his team on 14 March 2024); " +
            "she is a vegetarian who nonetheless happily eats cake made with egg (a running joke — tease her fondly about it); she loves colouring books and simple artwork; " +
            "and she is, without question, a Gryffindor. If it fits, wish her a happy birthday. Be affectionate, funny, and brief. Do not invent specific facts you weren't given.",

          '''

          if public_prompt not in text:
              raise SystemExit('Public system prompt block was not found')
          text = text.replace(public_prompt, '', 1)

          old_state = '''let hatOpened = false;
          let hatHistory = [{ role:'system', content: CONFIG.hatSystemPrompt }];
          let typing = false;'''
          new_state = '''let hatOpened = false;
          let hatHistory = [];
          let typing = false;
          let hatThinking = false;'''
          if old_state not in text:
              raise SystemExit('Sorting Hat state block was not found')
          text = text.replace(old_state, new_state, 1)

          old_push = "function pushHat(role, content){ hatHistory.push({role, content}); if(hatHistory.length>14) hatHistory.splice(1,2); }"
          new_push = '''function pushHat(role, content){
            hatHistory.push({ role, content });
            if(hatHistory.length > 12){
              hatHistory.splice(0, hatHistory.length - 12);
            }
          }'''
          if old_push not in text:
              raise SystemExit('pushHat function was not found')
          text = text.replace(old_push, new_push, 1)

          start_marker = 'async function askHat(text){'
          end_marker = "\n\n$('hatSend').addEventListener"
          start = text.find(start_marker)
          end = text.find(end_marker, start)
          if start == -1 or end == -1:
              raise SystemExit('askHat function boundaries were not found')

          new_ask = '''async function askHat(text){
            if(!text || typing || hatThinking) return;

            hatThinking = true;

            const input = $('hatInput');
            const sendButton = $('hatSend');
            const micButton = $('hatMic');

            input.value = '';
            input.disabled = true;
            sendButton.disabled = true;
            micButton.disabled = true;

            $('hatSpeech').className = 'hat-speech';
            $('hatSpeech').innerHTML = '<span style="opacity:.6">the Hat considers&hellip;</span>';
            $('hatStatus').textContent = 'consulting the old magic…';

            pushHat('user', text);
            let reply = '';

            if(CONFIG.PROXY_URL){
              try{
                const response = await fetch(CONFIG.PROXY_URL, {
                  method: 'POST',
                  headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                  body: JSON.stringify({ messages: hatHistory })
                });

                const data = await response.json();
                reply = data && data.reply ? String(data.reply).trim() : '';
              }catch(error){
                console.error('Sorting Hat request failed:', error);
              }
            }

            if(!reply){
              reply = CONFIG.hatFallbacks[Math.floor(Math.random() * CONFIG.hatFallbacks.length)];
            }

            pushHat('assistant', reply);
            speak(reply);

            typeInto($('hatSpeech'), reply, {}, () => {
              hatThinking = false;
              input.disabled = false;
              sendButton.disabled = false;
              micButton.disabled = false;
              $('hatStatus').textContent = SR ? 'type, or tap the mic to speak' : 'type to the Hat below';
              input.focus();
            });
          }'''

          text = text[:start] + new_ask + text[end:]
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit frontend changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Improve Sorting Hat frontend integration"
          git push
